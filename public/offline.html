<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAPIN Offline Map</title>
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <svg viewBox="15 10 170 145" xmlns="http://www.w3.org/2000/svg" style="height: 40px; width: auto; margin-right: 12px; flex-shrink: 0;">
            <polygon points="20,30 60,30 100,90 140,30 180,30 180,140 140,140 140,90 100,150 60,90 60,140 20,140" fill="#1f2937" />
            <path d="M100,15 C75,15 55,35 55,60 C55,90 100,130 100,130 L100,75 A15,15 0 0,1 100,45 L100,15 Z" fill="#11c1e0"/>
            <path d="M100,15 C125,15 145,35 145,60 C145,90 100,130 100,130 L100,75 A15,15 0 0,0 100,45 L100,15 Z" fill="#0ea3be"/>
          </svg>
          <span style="display: flex; flex-direction: column; justify-content: center;">
            <strong style="color: #111827; font-size: 18px; line-height: 1.1; letter-spacing: 0.5px;">MAPIN</strong>
            <small style="font-size: 0.75rem; color: #718096; line-height: 1;">Offline campus maps</small>
          </span>
        </a>
        <div class="top-actions">
          <a class="button ghost" href="/">Admin</a>
          <button class="button primary" id="offlineLocateButton" type="button">Live Location</button>
        </div>
      </header>

      <main class="offline-grid">
        <section class="offline-map-wrap">
          <div class="workspace-head">
            <div>
              <p class="eyebrow">Leaflet offline tiles</p>
              <h1 id="offlineTitle">Offline Map</h1>
              <p class="muted" id="offlineMeta">Local tiles, local markers, no Google API.</p>
            </div>
            <div class="tool-strip">
              <select id="offlineInstitutionSelect" aria-label="Institution"></select>
              <button class="button accent" id="offlineRouteButton" type="button">Draw Route</button>
            </div>
          </div>
          <div id="offlineLeafletMap" class="leaflet-map"></div>
        </section>

        <aside class="offline-panel">
          <section class="panel">
            <div class="section-title">
              <span>Search</span>
              <small id="offlinePinCount">0 pins</small>
            </div>
            <input id="offlineSearch" class="search-input" type="search" placeholder="Search offline locations">
            <div id="offlineResults" class="pin-results"></div>
          </section>

          <section class="panel">
            <div class="section-title">
              <span>Selected</span>
              <small id="offlineMode">Tile mode</small>
            </div>
            <div id="offlineDetail" class="destination-detail"></div>
          </section>

          <section class="panel">
            <div class="section-title">
              <span>Live Location</span>
              <small id="offlineLiveMode">Idle</small>
            </div>
            <p id="offlineLiveStatus" class="live-status">Live location idle</p>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/vendor/leaflet/leaflet.js"></script>
    <script src="/offline.js?v=2" defer></script>
  </body>
</html>
