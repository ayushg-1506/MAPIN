<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAPIN - Google Maps Mode</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
      .google-map-shell {
        background: #e2e8f0;
      }
      .google-map-container {
        width: 100%;
        height: 100%;
        min-height: 500px;
        height: calc(100vh - 216px);
        border-radius: var(--radius);
      }
      @media (max-width: 1180px) {
        .google-map-container {
          height: min(70vh, 700px);
        }
      }
    </style>
  </head>
  <body class="visitor-body">
    <div class="visitor-shell">
      <header class="topbar visitor-topbar">
        <a class="brand" href="/">
          <svg viewBox="15 10 170 145" xmlns="http://www.w3.org/2000/svg" style="height: 40px; width: auto; margin-right: 12px; flex-shrink: 0;">
            <polygon points="20,30 60,30 100,90 140,30 180,30 180,140 140,140 140,90 100,150 60,90 60,140 20,140" fill="#1f2937" />
            <path d="M100,15 C75,15 55,35 55,60 C55,90 100,130 100,130 L100,75 A15,15 0 0,1 100,45 L100,15 Z" fill="#11c1e0"/>
            <path d="M100,15 C125,15 145,35 145,60 C145,90 100,130 100,130 L100,75 A15,15 0 0,0 100,45 L100,15 Z" fill="#0ea3be"/>
          </svg>
          <span style="display: flex; flex-direction: column; justify-content: center;">
            <strong style="color: #111827; font-size: 18px; line-height: 1.1; letter-spacing: 0.5px;">MAPIN</strong>
            <small id="visitorSubtitle" style="font-size: 0.75rem; color: #718096; line-height: 1;">Google Maps View</small>
          </span>
        </a>
        <div class="top-actions">
          <a class="button ghost" id="offlineVisitorLink" href="/offline.html?id=demo-campus">Offline Map</a>
          <button class="button ghost" id="visitorLocateButton" type="button">Live Location</button>
          <button class="button primary" id="visitorCopyButton" type="button">Copy Link</button>
        </div>
      </header>

      <main class="visitor-grid">
        <section class="visitor-map-area">
          <div class="visitor-heading">
            <div>
              <p class="eyebrow">Google Maps Mode</p>
              <h1 id="visitorCampusName">Loading Campus</h1>
              <p id="visitorCampusMeta" class="muted">Loading GPS map data</p>
            </div>
            <div class="visitor-search-wrap">
              <input id="visitorSearch" class="search-input" type="search" placeholder="Search destination">
              <div id="visitorCategoryChips" class="category-chips"></div>
            </div>
          </div>
          <div class="map-shell google-map-shell">
            <div id="googleMap" class="google-map-container" aria-label="Campus Google Map">
              <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted);">
                Loading Google Maps API...
              </div>
            </div>
          </div>
        </section>

        <aside class="visitor-panel">
          <section class="panel destination-panel">
            <div class="section-title">
              <span>Destination</span>
              <small id="visitorPinCount">0 pins</small>
            </div>
            <div id="destinationDetail" class="destination-detail"></div>
            <a class="button accent wide disabled-link" id="googleMapsLink" href="#" target="_blank" rel="noreferrer">Get Directions 🧭</a>
          </section>

          <section class="panel">
            <div class="section-title">
              <span>Results</span>
              <small id="visitorResultCount">0 found</small>
            </div>
            <div id="visitorResults" class="pin-results"></div>
          </section>

          <section class="panel" id="visitorMediaPanel">
            <div class="section-title">
              <span>Campus Views</span>
              <small id="visitorMediaCount">0 items</small>
            </div>
            <div id="visitorMediaGallery" class="media-gallery"></div>
          </section>

          <section class="panel">
            <div class="section-title">
              <span>Live Location</span>
              <small id="visitorLiveMode">Idle</small>
            </div>
            <p id="visitorLiveStatus" class="live-status">Live location idle</p>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/google.js" defer></script>
  </body>
</html>
